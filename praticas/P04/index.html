<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
        }

        header {
            color: white;
            background-color: black;
            padding: 15px 0px 15px 15px;;
        }

        header > h1 {
            margin: 0;
        }

        header > p {
            margin: 0;
        }

        main > div {
            height: 800px;
            background-color: green;
            color: white;
            text-align: center;
        }

        main > div > h1 {
            margin: 0px;
        }

        footer {
            padding-bottom: 60px;
        }

        footer > h2 {
             text-align: center;
             padding: 30px 0px 0px 0px;
        }

        footer > div {
            border: 1px solid whitesmoke;
            height: 100px;
            width: 900px;
            box-shadow:1px 1px 7px 1px rgba(0, 0, 0, 0.096);
            margin: auto;
            border-radius: 10px;
            padding-left: 20px;
            color: green;
        }

        footer > div > p {
            color: black;
        }
    </style>
</head>
<body>
    <header>
        <h1>Meu Portfólio</h1>
        <p>Início</p>
        <p>Projetos</p>
        <p>Contato</p>
    </header>
    <main>
        <div>
            <h1>Olá, eu sou Dev</h1>
            <h2>Desenvolvedor (a) Front-End em formação</h2>
        </div>
    </main>
    <footer>
        <h2>Meus Projetos</h2>
        <div>
            <h3>Projeto 1</h3>
            <p></p>
        </div>
        <div>
            <h3>Projeto 2</h3>
            <p></p>
        </div>
        <div>
            <h3>Projeto 3</h3>
            <p></p>
        </div>
    </footer>
</body>
</html>
